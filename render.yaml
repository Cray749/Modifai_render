# ════════════════════════════════════════════════════════════════════════════════
# Modifai — Render Blueprint
# Deploy with: render.com → New → Blueprint → point at this repo
# ════════════════════════════════════════════════════════════════════════════════

services:

  # ── Backend — FastAPI Web Service ─────────────────────────────────────────────
  - type: web
    name: modifai-backend
    env: python
    plan: free
    region: oregon
    # Run from repo root so virtual_mind/ is accessible at ../../../virtual_mind
    # relative to backend/app/services/ (which is how virtual_mind_service.py
    # resolves its VIRTUAL_MIND_PATH).
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      # ── Python ─────────────────────────────────────────────────────────────
      - key: PYTHON_VERSION
        value: 3.12.3

      # ── Server ─────────────────────────────────────────────────────────────
      - key: HOST
        value: 0.0.0.0

      # ── Database (ephemeral on free plan — resets on redeploy) ─────────────
      - key: DATABASE_PATH
        value: modifai.db

      # ── AWS ────────────────────────────────────────────────────────────────
      - key: AWS_REGION
        value: ap-south-1
      - key: S3_BUCKET
        value: modifai-modifaidatabucket-i9qdgwtbeceg

      # ── LLM / Virtual Mind (set LLM_PROVIDER to match your key) ───────────
      # Options: openrouter | gemini | bedrock
      - key: LLM_PROVIDER
        value: openrouter
      - key: OR_MODEL
        value: deepseek/deepseek-chat-v3
      - key: OR_FALLBACK_1
        value: qwen/qwen3-235b-a22b
      - key: OR_FALLBACK_2
        value: google/gemini-2.5-flash-lite
      - key: OR_MAX_RETRIES
        value: "3"
      - key: OPENROUTER_MODEL
        value: deepseek/deepseek-chat-v3

      # ── Pipeline defaults ───────────────────────────────────────────────────
      - key: DEFAULT_SAMPLES_PER_CHUNK
        value: "5"
      - key: DEFAULT_QUALITY_THRESHOLD
        value: "0.7"

      # ── CORS — must include your deployed frontend URL ──────────────────────
      - key: CORS_ORIGINS
        value: https://modifai-frontend.onrender.com,http://localhost:5173

      # ── SECRET variables — add these 4 in the Render dashboard ────────────
      # Render Dashboard → modifai-backend → Environment → Add Env Var
      # (use Secret type so they are encrypted and never shown in logs)
      #
      #   AWS_ACCESS_KEY_ID         (your IAM key)
      #   AWS_SECRET_ACCESS_KEY     (your IAM secret — note: contains special chars, paste carefully)
      #   STATE_MACHINE_ARN         arn:aws:states:ap-south-1:...:stateMachine:ModifaiStateMachine-...
      #   OPENROUTER_API_KEY        sk-or-v1-...


  # ── Frontend — React / Vite Static Site ──────────────────────────────────────
  - type: static
    name: modifai-frontend
    # VITE_API_URL is injected as a shell variable so Vite bakes it into the
    # production bundle at build time. type:static does NOT support envVars in
    # render.yaml — this inline approach is the correct workaround.
    buildCommand: cd frontend && VITE_API_URL=https://modifai-backend.onrender.com/api/v1 npm install && VITE_API_URL=https://modifai-backend.onrender.com/api/v1 npm run build
    staticPublishPath: frontend/dist
    # NOTE: After deploy, configure the SPA rewrite in the Render dashboard:
    # Static Site → Redirects/Rewrites → Add Rule: source=/* destination=/index.html type=Rewrite
